services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_LOAD_TIMEOUT=15m
      - OLLAMA_KEEP_ALIVE=0
    restart: "no"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  speaches:
    image: ghcr.io/speaches-ai/speaches:latest-cuda
    container_name: speaches
    ports:
      - "9000:8000"
    volumes:
      - speaches_cache:/root/.cache
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-large-v3
      - WHISPER__INFERENCE_DEVICE=cuda
      - WHISPER__COMPUTE_TYPE=float16
      - STT_MODEL_TTL=0
    restart: "no"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-gpu:latest
    container_name: kokoro
    ports:
      - "8880:8880"
    environment:
      - TARGET_MIN_TOKENS=175
      - TARGET_MAX_TOKENS=250
      - ABSOLUTE_MAX_TOKENS=450
    restart: "no"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  comfyui:
    build:
      context: .
      dockerfile: Dockerfile.comfyui
    image: comfyui-flux2-klein:local
    container_name: comfyui
    ports:
      - "8188:8188"
    volumes:
      - comfyui_app:/app
      - comfyui_models:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - LOW_VRAM=${LOW_VRAM:-false}
    restart: "no"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    restart: "no"

  openwebui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: openwebui
    ports:
      - "3000:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      # Ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      # Image generation via ComfyUI
      - ENABLE_IMAGE_GENERATION=true
      - IMAGE_GENERATION_ENGINE=comfyui
      - COMFYUI_BASE_URL=http://comfyui:8188
      - COMFYUI_WORKFLOW={"last_node_id":9,"last_link_id":10,"nodes":[{"id":1,"type":"UnetLoaderGGUF","pos":[50,200],"inputs":[],"outputs":[{"name":"MODEL","type":"MODEL","links":[1]}],"title":"Load UNet (GGUF)","widgets_values":["flux-2-klein-4b-Q5_K_S.gguf"]},{"id":2,"type":"CLIPLoaderGGUF","pos":[50,350],"inputs":[],"outputs":[{"name":"CLIP","type":"CLIP","links":[2,3]}],"title":"Load CLIP (GGUF - Qwen3)","widgets_values":["qwen_3_4b_fp4_flux2.safetensors","flux2"]},{"id":3,"type":"VAELoader","pos":[50,500],"inputs":[],"outputs":[{"name":"VAE","type":"VAE","links":[9]}],"title":"Load VAE","widgets_values":["flux2-vae.safetensors"]},{"id":4,"type":"CLIPTextEncode","pos":[350,280],"inputs":[{"name":"clip","type":"CLIP","link":2}],"outputs":[{"name":"CONDITIONING","type":"CONDITIONING","links":[4]}],"title":"Positive Prompt","widgets_values":["a beautiful landscape, masterpiece, highly detailed"]},{"id":5,"type":"CLIPTextEncode","pos":[350,420],"inputs":[{"name":"clip","type":"CLIP","link":3}],"outputs":[{"name":"CONDITIONING","type":"CONDITIONING","links":[5]}],"title":"Negative Prompt","widgets_values":[""]},{"id":6,"type":"EmptyLatentImage","pos":[350,560],"inputs":[],"outputs":[{"name":"LATENT","type":"LATENT","links":[6]}],"title":"Empty Latent Image","widgets_values":[1024,1024,1]},{"id":7,"type":"KSampler","pos":[650,350],"inputs":[{"name":"model","type":"MODEL","link":1},{"name":"positive","type":"CONDITIONING","link":4},{"name":"negative","type":"CONDITIONING","link":5},{"name":"latent_image","type":"LATENT","link":6}],"outputs":[{"name":"LATENT","type":"LATENT","links":[8]}],"title":"KSampler","widgets_values":[42,"fixed",4,1.0,"euler","simple",1.0]},{"id":8,"type":"VAEDecode","pos":[950,350],"inputs":[{"name":"samples","type":"LATENT","link":8},{"name":"vae","type":"VAE","link":9}],"outputs":[{"name":"IMAGE","type":"IMAGE","links":[10]}],"title":"VAE Decode","widgets_values":[]},{"id":9,"type":"SaveImage","pos":[1150,350],"inputs":[{"name":"images","type":"IMAGE","link":10}],"outputs":[],"title":"Save Image","widgets_values":["ComfyUI"]}],"links":[[1,1,0,7,0,"MODEL"],[2,2,0,4,0,"CLIP"],[3,2,0,5,0,"CLIP"],[4,4,0,7,1,"CONDITIONING"],[5,5,0,7,2,"CONDITIONING"],[6,6,0,7,3,"LATENT"],[8,7,0,8,0,"LATENT"],[9,3,0,8,1,"VAE"],[10,8,0,9,0,"IMAGE"]],"groups":[],"config":{},"extra":{},"version":0.4}
      # Node mappings: tell OpenWebUI which node IDs carry the prompt and image size
      - COMFYUI_WORKFLOW_NODES={"text":["4"],"ckpt_name":["1"],"width":["6"],"height":["6"],"steps":["7"],"seed":["7"]}
      # TTS via Kokoro
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://kokoro:8880/v1
      - AUDIO_TTS_OPENAI_API_KEY=not-needed
      - AUDIO_TTS_MODEL=kokoro
      - AUDIO_TTS_VOICE=af_bella
      # STT via Speaches
      - AUDIO_STT_ENGINE=openai
      - AUDIO_STT_OPENAI_API_BASE_URL=http://speaches:8000/v1
      - AUDIO_STT_OPENAI_API_KEY=not-needed
      - AUDIO_STT_MODEL=Systran/faster-whisper-large-v3
      # Web search via SearXNG
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
    depends_on:
      - ollama
      - speaches
      - kokoro
      - comfyui
      - searxng
    restart: "no"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  searxng_data:
  ollama_models:
  speaches_cache:
  comfyui_app:
  comfyui_models:
  openwebui_data:
